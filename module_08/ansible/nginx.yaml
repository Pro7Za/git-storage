---
- hosts: nginx_servers
  vars:
    reactjs_host_ip: 178.154.221.84
    reactjs_host_port: 80
  pre_tasks:
    - name: "absent nginx"
      file:
        path: "/etc/nginx/sites-enabled/default"
        state: absent
  tasks:
    - name: "add vhost conf"
      template:
        src: ./templates/nginx.conf.j2
        dest: /etc/nginx/sites-enabled/nginx.conf
        force: true
        owner: root
        mode: 0644
      notify: reload nginx 
  handlers:
    - name: "reload nginx"
      service: name=nginx state=reloaded

  roles:
    - role: "/home/name/module_08/roles/nginx"
